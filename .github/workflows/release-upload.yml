name: Upload to Release

on:
  workflow_run:
    workflows: ['KiBot', 'Build', 'Render']
    types: [completed]

jobs:
  check-all-passed:
    runs-on: ubuntu-latest
    outputs:
      all-passed: ${{ steps.check.outputs.all-passed }}
    steps:
      - name: Check if all workflows passed
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const workflowNames = ['KiBot', 'Build', 'Render'];
            const { owner, repo } = context.repo;
            const headSha = context.payload.workflow_run.head_commit.id;
            
            let allPassed = true;
            for (const workflow of workflowNames) {
              const runs = await github.rest.actions.listWorkflowRunsForRepo({
                owner,
                repo,
                head_sha: headSha,
                status: 'completed'
              });
              
              const workflowRun = runs.data.workflow_runs.find(r => r.name === workflow);
              if (!workflowRun || workflowRun.conclusion !== 'success') {
                allPassed = false;
                break;
              }
            }
            
            core.setOutput('all-passed', allPassed.toString());

  upload-release:
    needs: check-all-passed
    runs-on: ubuntu-latest
    if: needs.check-all-passed.outputs.all-passed == 'true' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'master'
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download KiBot artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: kibot.yml
          workflow_conclusion: success
          commit: ${{ github.event.workflow_run.head_commit.id }}
          path: artifacts/kibot

      - name: Download Build artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: build.yml
          workflow_conclusion: success
          commit: ${{ github.event.workflow_run.head_commit.id }}
          path: artifacts/build

      - name: Download Render artifacts
        uses: dawidd6/action-download-artifact@v6
        with:
          workflow: render.yml
          workflow_conclusion: success
          commit: ${{ github.event.workflow_run.head_commit.id }}
          path: artifacts/render

      - name: Upload to Latest Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          tag_name: latest
          prerelease: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
